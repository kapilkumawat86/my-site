<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#10172a"><link rel="manifest" href="manifest.json"><title>Options Trader: Volatility Wars</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#0b1020;color:#eef3ff}.app{max-width:1050px;margin:auto;padding:18px}.card{background:#141d3a;border:1px solid #2b3a68;border-radius:20px;padding:20px;margin:14px 0}button{background:#7cf7d4;color:#06251d;border:0;border-radius:14px;padding:12px 16px;font-weight:800;margin:6px;cursor:pointer}.secondary{background:#26365f;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.choice{background:#19264d;border:1px solid #334573;border-radius:16px;padding:14px;cursor:pointer}.choice:hover{outline:2px solid #7cf7d4}.pill{display:inline-block;background:#1d335f;color:#7cf7d4;border-radius:99px;padding:6px 10px;margin:4px}.stat{display:flex;justify-content:space-between;border-bottom:1px solid #334573;padding:8px 0}.result{background:#0f1830;border-left:5px solid #7cf7d4;border-radius:12px;padding:12px;margin-top:12px}.nav button{font-size:12px}.active{background:#ffd166!important;color:#211800!important}.terminal{white-space:pre-wrap;background:#050915;color:#c8f7e6;border-radius:14px;padding:14px;min-height:90px}h1{font-size:34px}p{color:#b7c2df;line-height:1.5}</style></head><body><div class="app"><div class="card"><span class="pill">Offline PWA</span><span class="pill">6 Hour Learning Path</span><h1>🎮 Options Trader: Volatility Wars</h1><p>Learn options through missions, simulations, quizzes, strategy labs, and final boss battles. Progress is saved on this device.</p><button id="startBtn">Start / Continue Game</button><button class="secondary" id="resetBtn">Reset</button></div><div class="card"><h2>Player</h2><div class="stat"><span>Capital</span><b id="capital">₹10,00,000</b></div><div class="stat"><span>XP</span><b id="xp">0</b></div><div class="stat"><span>Rank</span><b id="rank">Retail Rookie</b></div><div class="stat"><span>Badges</span><b id="badges">0</b></div></div><div class="nav card" id="nav"></div><main class="card" id="game"></main></div><script>const chapters=['Intro','Calls & Puts','ATM ITM OTM','Option Chain','IV Weather','Delta Driver','Theta Farmer','Gamma Monster','Vega Lab','Payoff Graphs','Delta Neutral','Strategy Selector','Final Boss'];let state=JSON.parse(localStorage.getItem('owars')||'null')||{chapter:0,xp:0,capital:1000000,badges:[]};function save(){localStorage.setItem('owars',JSON.stringify(state));ui()}function money(n){return '₹'+Math.round(n).toLocaleString('en-IN')}function ui(){capital.textContent=money(state.capital);xp.textContent=state.xp;badges.textContent=state.badges.length;rank.textContent=state.xp>900?'Volatility Master':state.xp>650?'Strategy Captain':state.xp>350?'Greek Explorer':state.xp>120?'Market Learner':'Retail Rookie';nav.innerHTML=chapters.map((c,i)=>'<button class="'+(i===state.chapter?'active':'secondary')+'" onclick="go('+i+')">'+i+'. '+c+'</button>').join('')}function go(i){state.chapter=i;save();render()}function award(x,c,b){state.xp+=x;state.capital+=c||0;if(b&&!state.badges.includes(b))state.badges.push(b);save()}function answer(ok,msg,b){document.getElementById('feedback').innerHTML='<div class=result><b>'+(ok?'✅ Correct':'❌ Learn')+'</b><p>'+msg+'</p></div>';award(ok?70:20,ok?15000:-5000,ok?b:null)}function next(){go(Math.min(chapters.length-1,state.chapter+1))}function render(){ui();let c=state.chapter;let html='';if(c===0)html='<h2>Welcome</h2><p>This expanded version is designed as a 6-hour journey: each chapter can take 20–30 minutes with replay, notes, simulations, and boss checks.</p><div class=grid><div class=choice><b>Goal</b><p>Understand options intuitively.</p></div><div class=choice><b>Rule</b><p>Experience first, formula later.</p></div><div class=choice><b>Offline</b><p>Install this PWA and continue without internet.</p></div></div><button onclick=next()>Start Chapter 1</button>';if(c===1)html='<h2>Calls & Puts</h2><p>NIFTY is 25,000. You expect a rally.</p><div class=grid><div class=choice onclick="answer(1,\'Calls benefit from upside with limited premium loss.\',\'Direction Scout\')">Buy Call</div><div class=choice onclick="answer(0,\'Puts are mainly for downside view.\')">Buy Put</div><div class=choice onclick="answer(0,\'Avoiding is safe but not the chapter answer.\')">Do Nothing</div></div><div id=feedback></div><button onclick="sim(1)">Run Payoff Sim</button><div class=terminal id=simbox></div><button onclick=next()>Next</button>';if(c===2)html='<h2>ATM / ITM / OTM</h2><p>Spot 25,000. What is 25,500 CE?</p><div class=grid><div class=choice onclick="answer(0,\'For calls, lower strike than spot is ITM.\')">ITM</div><div class=choice onclick="answer(0,\'ATM is closest to spot.\')">ATM</div><div class=choice onclick="answer(1,\'Correct: 25,500 CE is OTM.\',\'Strike Warrior\')">OTM</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===3)html='<h2>Option Chain Detective</h2><p>Highest CE OI is at 25,500. Highest PE OI is at 24,500.</p><div class=grid><div class=choice onclick="answer(1,\'High call OI often behaves like resistance.\',\'Chain Detective\')">Resistance 25,500</div><div class=choice onclick="answer(0,\'High put OI is more like support.\')">Resistance 24,500</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===4)html='<h2>IV Weather</h2><p>High IV means options are expensive. After events, IV crush can hurt buyers.</p><button onclick="document.getElementById(\'iv\').textContent=\'High IV premium ₹220 → after event ₹95 despite flat market.\'">Storm Mode</button><div class=terminal id=iv></div><div class=grid><div class=choice onclick="answer(1,\'Correct. IV crush can reduce premium sharply.\',\'IV Reader\')">Risk is IV Crush</div><div class=choice onclick="answer(0,\'Theta matters, but event IV crush is the main lesson.\')">Only brokerage cost</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===5)html='<h2>Delta Driver</h2><p>Delta is speed. Delta 0.5 means option changes about ₹0.5 for ₹1 underlying move.</p><button onclick="document.getElementById(\'d\').textContent=\'Underlying +100, delta .50 option ≈ +50.\'">Drive</button><div class=terminal id=d></div><div class=grid><div class=choice onclick="answer(1,\'Higher delta reacts faster to direction.\',\'Delta Driver\')">Higher delta = faster</div><div class=choice onclick="answer(0,\'Lower delta is cheaper but slower.\')">Lower delta = faster</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===6)html='<h2>Theta Farmer</h2><p>Theta is time decay. Buyers fight time; sellers collect decay when risk is controlled.</p><div class=grid><div class=choice onclick="answer(1,\'Sellers generally benefit from time decay.\',\'Theta Farmer\')">Seller benefits</div><div class=choice onclick="answer(0,\'Buyers need fast movement to beat decay.\')">Buyer benefits</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===7)html='<h2>Gamma Monster</h2><p>Gamma is acceleration. Near expiry, delta changes very fast.</p><div class=grid><div class=choice onclick="answer(1,\'Gamma risk is highest near expiry, especially ATM.\',\'Gamma Survivor\')">Near expiry</div><div class=choice onclick="answer(0,\'Far expiry gamma is usually smoother.\')">Far expiry</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===8)html='<h2>Vega + Calendar Lab</h2><p>Vega is IV sensitivity. Calendars combine different expiries.</p><div class=grid><div class=choice onclick="answer(1,\'Calendars usually prefer range-bound markets and favorable IV/time structure.\',\'Calendar Wizard\')">Range market</div><div class=choice onclick="answer(0,\'Huge directional movement can move outside the tent.\')">Huge trend</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===9)html='<h2>Payoff Graphs</h2><p>A payoff graph shows where you profit, lose, breakeven, and where max risk sits.</p><div class=terminal>Long Call: limited loss, unlimited upside\nShort Iron Condor: limited profit, limited loss, range-bound</div><button onclick="answer(1,\'Correct: payoff graphs help visualize risk before entry.\',\'Payoff Mapper\')">I understand risk map</button><div id=feedback></div><button onclick=next()>Next</button>';if(c===10)html='<h2>Delta Neutral</h2><p>Delta neutral means your position does not strongly care about small directional moves initially.</p><div class=grid><div class=choice onclick="answer(1,\'A long +50 delta and short -50 delta can net near zero.\',\'Neutral Builder\')">+50 and -50 delta</div><div class=choice onclick="answer(0,\'Both positive deltas create directional upside exposure.\')">+50 and +30 delta</div></div><div id=feedback></div><button onclick=next()>Next</button>';if(c===11)html='<h2>Strategy Selector</h2><p>Choose based on view: direction, range, IV, expiry, event risk.</p><div class=grid><div class=choice onclick="answer(1,\'Range + high IV often favors defined-risk premium strategies, but event gaps need caution.\',\'Strategy Captain\')">Iron Condor with caution</div><div class=choice onclick="answer(0,\'Naked buying before event can lose from IV crush.\')">Naked options before event</div></div><div id=feedback></div><button onclick=next()>Final Boss</button>';if(c===12)html='<h2>Final Boss</h2><p>Market is range-bound. IV is high before event. Expiry is close. Option chain shows support and resistance.</p><div class=grid><div class=choice onclick="answer(1,\'You selected a structured range strategy with risk awareness. You win.\',\'Volatility Master\')">Defined-risk range strategy, smaller size, post-event adjustment plan</div><div class=choice onclick="answer(0,\'Too much event, gamma and IV crush risk.\')">All-in far OTM options</div></div><div id=feedback></div><button onclick="go(0)">Replay</button>';game.innerHTML=html}function sim(){simbox.textContent='Move -300: -80 premium loss\nMove 0: -80 premium loss\nMove +100: +20\nMove +300: +220\nLesson: call needs upside beyond premium.'}startBtn.onclick=()=>{if(state.chapter===0)state.chapter=1;save();render()};resetBtn.onclick=()=>{localStorage.removeItem('owars');state={chapter:0,xp:0,capital:1000000,badges:[]};save();render()};if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}render();</script></body></html>
