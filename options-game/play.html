<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Options Game</title><style>body{margin:0;font-family:Arial;background:#08101f;color:#fff}#app{padding:20px}button{padding:12px 16px;border-radius:10px;border:0;background:#65f0c5;color:#000;font-weight:bold;margin:5px;cursor:pointer}.card{background:#13203d;padding:16px;border-radius:16px;margin:12px 0}.chapter{padding:12px;border:1px solid #334;border-radius:12px;margin:8px 0;background:#101a33}.terminal{background:#000;padding:12px;border-radius:12px;white-space:pre-wrap;color:#7fffd4}.tag{display:inline-block;padding:4px 8px;background:#1f325d;border-radius:999px;margin-right:6px;font-size:12px}</style></head><body><div id="app"><h1>Loading game...</h1></div><script>document.addEventListener('DOMContentLoaded',function(){try{var chapters=[{t:'Bootcamp',d:'Learn risk and capital basics.',s:'Capital ₹10,00,000. Risk 2% max = ₹20,000.',m:'Write one trading rule you will never break.'},{t:'Calls & Puts',d:'Learn directional options.',s:'Call benefits from upside. Put benefits from downside.',m:'Choose Call, Put or Avoid.'},{t:'Option Chain',d:'Learn OI and liquidity.',s:'High CE OI can indicate resistance. High PE OI can indicate support.',m:'Find support and resistance.'},{t:'IV & Vega',d:'Understand IV crush.',s:'After event IV can collapse even if direction is correct.',m:'Decide whether to buy options before event.'},{t:'Greeks',d:'Delta Gamma Theta Vega.',s:'Delta is speed. Gamma is acceleration. Theta is decay.',m:'Match each Greek with risk.'},{t:'Iron Condor',d:'Range strategy.',s:'Works best in range markets.',m:'Build an Iron Condor.'},{t:'Calendar & DC',d:'Understand Calendar and Double Calendar.',s:'Front expiry decays faster.',m:'Choose DC vs Iron Condor.'},{t:'Expiry Simulator',d:'Gamma risk near expiry.',s:'Expiry can create violent P&L swings.',m:'Choose hold hedge reduce or exit.'},{t:'Final Boss',d:'Combine everything.',s:'Use regime + IV + Greeks + risk.',m:'Write full trade plan.'}];var state={chapter:0,xp:0};function render(){var c=chapters[state.chapter];var html='';html+='<h1>🎮 Options Trader: Volatility Wars</h1>';html+='<div><span class="tag">XP '+state.xp+'</span><span class="tag">Chapter '+(state.chapter+1)+'/'+chapters.length+'</span></div>';html+='<div class="card">';html+='<h2>'+c.t+'</h2>';html+='<p>'+c.d+'</p>';html+='<div class="terminal">'+c.s+'</div>';html+='<div class="chapter"><b>Mission:</b><br>'+c.m+'</div>';html+='<textarea id="note" style="width:100%;height:100px;background:#09111f;color:#fff;border:1px solid #334;border-radius:10px;padding:10px" placeholder="Write your answer or trade note..."></textarea><br>';html+='<button id="saveBtn">Submit Note</button>';html+='<button id="prevBtn">Prev</button>';html+='<button id="nextBtn">Next</button>';html+='</div>';html+='<div class="card"><h3>Market Replay</h3><div class="terminal">Spot 25000\nIV 18%\nRegime RANGE</div></div>';html+='<div class="card"><h3>Strategy Builder</h3><button>Long Call</button><button>Iron Condor</button><button>Calendar</button></div>';document.getElementById('app').innerHTML=html;document.getElementById('saveBtn').onclick=function(){var v=document.getElementById('note').value;if(v.length<5){alert('Write more');return;}state.xp+=50;alert('XP awarded');render();};document.getElementById('prevBtn').onclick=function(){state.chapter=Math.max(0,state.chapter-1);render();};document.getElementById('nextBtn').onclick=function(){state.chapter=Math.min(chapters.length-1,state.chapter+1);render();};}render();}catch(e){document.getElementById('app').innerHTML='<h1>Game Error</h1><div class="card">'+e.message+'</div>';}});</script></body></html>
